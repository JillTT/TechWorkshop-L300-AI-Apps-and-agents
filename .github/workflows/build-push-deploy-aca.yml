name: Build, Push, Deploy (Azure Container Apps)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      # Build context is ONLY ./src, and Dockerfile is ./src/Dockerfile
      - name: Build Docker image (src only)
        working-directory: src
        run: |
          docker build \
            -f Dockerfile \
            -t "${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_REPOSITORY }}:${IMAGE_TAG}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_REPOSITORY }}:${IMAGE_TAG}"

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_REPOSITORY }}:${IMAGE_TAG}" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.gpt_endpoint }}" \
              embedding_endpoint="${{ secrets.embedding_endpoint }}" \
              phi_4_endpoint="${{ secrets.phi_4_endpoint }}"
